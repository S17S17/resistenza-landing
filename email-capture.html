<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESISTENZA — Get the Tools + Updates</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #F5F5FA; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #111; border: 1px solid #222; padding: 48px; max-width: 480px; width: 100%; text-align: center; }
        .tag { font-size: 10px; letter-spacing: 4px; color: #FFB800; margin-bottom: 20px; text-transform: uppercase; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; color: #fff; }
        .subtitle { font-size: 15px; color: #888; margin-bottom: 32px; line-height: 1.6; }
        .benefit { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 16px; margin: 12px 0; text-align: right; }
        .benefit-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 6px; }
        .benefit-desc { font-size: 12px; color: #666; }
        .email-box { margin: 28px 0; }
        .email-box input { width: 100%; background: #0a0a0a; border: 1px solid #333; color: #fff; padding: 14px; font-size: 15px; text-align: center; margin-bottom: 10px; box-sizing: border-box; }
        .email-box input::placeholder { color: #444; }
        .email-box button { width: 100%; background: #FFB800; color: #000; border: none; padding: 16px; font-size: 15px; font-weight: 700; cursor: pointer; }
        .email-box button:hover { background: #e6a600; }
        .product-teaser { border-top: 1px solid #222; margin-top: 24px; padding-top: 20px; }
        .product-teaser p { font-size: 12px; color: #555; margin-bottom: 10px; }
        .product-link { display: inline-block; background: transparent; border: 1px solid #333; color: #888; padding: 10px 20px; font-size: 13px; text-decoration: none; }
        .product-link:hover { border-color: #FFB800; color: #FFB800; }
        .footer { margin-top: 30px; font-size: 11px; color: #333; }
        .footer a { color: #555; text-decoration: none; }
        .success { display: none; background: #1a2a1a; border: 1px solid #2a4a2a; color: #4a8a4a; padding: 16px; margin: 20px 0; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="tag">RESISTENZA</div>
        <h1>Get the Full System</h1>
        <p class="subtitle">Enter your email and I'll send you the complete AI content machine — workflows, templates, and setup guides.</p>

        <div class="email-box" id="capture-form">
            <input type="email" placeholder="your@email.com" id="email">
            <button onclick="capture()">Get the Tools — Free</button>
        </div>
        
        <div class="success" id="success-msg">
            Got it. Check your inbox — I'm sending everything now.
        </div>

        <div class="product-teaser">
            <p>Or get it all set up for you:</p>
            <a href="https://semah.gumroad.com/l/CompleteBundle" class="product-link">
                Complete AI Content Machine — $69 →
            </a>
        </div>

        <div class="footer">
            <a href="https://twitter.com/Semah____">@Semah____</a> | RESISTENZA | Tunisia
        </div>
    </div>

    <script>
        function capture() {
            var email = document.getElementById('email').value;
            if (email && email.includes('@')) {
                // Send to Telegram bot
                var msg = 'EMAIL_CAPTURED:' + email + '|SOURCE:tool-download|' + new Date().toISOString();
                
                // Show success
                document.getElementById('capture-form').style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
                
                // Log it
                fetch('https://api.telegram.org/bot' + 'PLACEHOLDER' + '/sendMessage?chat_id=8186671304&text=' + encodeURIComponent(msg)).catch(function(){});
            } else {
                alert('Enter a valid email');
            }
        }
    </script>
</body>
</html>
